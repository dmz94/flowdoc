<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Decant</title>
<link rel="stylesheet" href="/static/app.css">
</head>
<body>
<div class="page-wrapper">

  <header class="site-header">
    <h1 class="site-title">Decant</h1>
    <button id="settings-btn" class="settings-btn hidden" type="button"
            aria-label="Text settings">
      <span class="settings-badge">Aa</span>
      <span class="settings-label">Text settings</span>
    </button>
  </header>

  <main class="container">

    <section id="input-zone" class="input-zone">
      <form id="url-form" class="url-form">
        <input type="text" id="url-input" name="url"
               placeholder="Paste a URL..." autocomplete="off">
        <button type="submit">Convert</button>
      </form>

      <div class="or-divider">or</div>

      <div id="drop-zone" class="drop-zone">
        <p>Drop an HTML file here, or click to browse</p>
        <input type="file" id="file-input" accept=".html,.htm" hidden>
      </div>
    </section>

    <div id="error" class="error-container hidden">
      <p class="error-message" id="error-message"></p>
      <p class="error-hint" id="error-hint"></p>
    </div>

    <div id="converting" class="converting-status hidden">
      Converting...
    </div>

    <section id="output" class="output-zone hidden">
      <div class="result-bar">
        <a id="view-original" class="view-original-link hidden"
           target="_blank" rel="noopener noreferrer">
          <span class="view-original-badge">
            <svg width="14" height="14" viewBox="0 0 12 12"
                 fill="none" stroke="currentColor" stroke-width="1.5">
              <path d="M5 1H1v10h10V7M7 1h4v4M5 7L11 1"/>
            </svg>
          </span>
          View Original
        </a>
      </div>
      <iframe id="output-frame" sandbox="allow-same-origin"></iframe>
    </section>

  </main>

  <!-- Text Settings Panel -->
  <div id="settings-overlay" class="settings-overlay hidden"></div>
  <aside id="settings-panel" class="settings-panel" aria-label="Text settings">
    <div class="panel-header">
      <span class="panel-title">Text settings</span>
      <button id="panel-close" class="panel-close" type="button"
              aria-label="Close settings">&times;</button>
    </div>

    <div class="panel-body">

      <!-- A. Font size -->
      <div class="control-group">
        <label class="control-label">Font size</label>
        <div class="slider-row">
          <span class="slider-label-left">Small</span>
          <input type="range" id="font-size-slider" min="0" max="4"
                 value="2" step="1" class="range-slider">
          <span class="slider-label-right">Large</span>
        </div>
      </div>

      <!-- B. Theme -->
      <div class="control-group">
        <label class="control-label">Theme</label>
        <div class="theme-row">
          <button type="button" class="theme-swatch active" data-theme="light"
                  style="background:#fafaf7;color:#333" aria-label="Light theme">Aa</button>
          <button type="button" class="theme-swatch" data-theme="cream"
                  style="background:#f5f0e8;color:#333" aria-label="Cream theme">Aa</button>
          <button type="button" class="theme-swatch" data-theme="dark"
                  style="background:#1e1e1e;color:#e0e0e0" aria-label="Dark theme">Aa</button>
          <button type="button" class="theme-swatch" data-theme="contrast"
                  style="background:#1a1a1a;color:#ffd700" aria-label="High contrast theme">Aa</button>
        </div>
      </div>

      <!-- C. Font -->
      <div class="control-group">
        <label class="control-label">Font</label>
        <div class="font-options">
          <label class="radio-option">
            <input type="radio" name="font" value="sans" checked>
            <span>Sans-serif</span>
          </label>
          <label class="radio-option">
            <input type="radio" name="font" value="opendyslexic">
            <span>OpenDyslexic</span>
          </label>
          <label class="radio-option">
            <input type="radio" name="font" value="serif">
            <span>Serif</span>
          </label>
        </div>
      </div>

      <!-- D. Text spacing -->
      <div class="control-group">
        <label class="control-label">Text spacing</label>
        <div class="spacing-row">
          <button type="button" class="spacing-btn active" data-spacing="standard"
                  aria-label="Standard spacing">Standard</button>
          <button type="button" class="spacing-btn" data-spacing="loose"
                  aria-label="Loose spacing">Loose</button>
          <button type="button" class="spacing-btn" data-spacing="veryloose"
                  aria-label="Very loose spacing">Very Loose</button>
        </div>
        <div class="spacing-label-display" id="spacing-label">Standard</div>
      </div>

      <!-- E. Content width -->
      <div class="control-group">
        <label class="control-label">Content width</label>
        <div class="width-row">
          <button type="button" class="width-btn" data-width="narrow"
                  aria-label="Narrow width">
            <svg width="24" height="18" viewBox="0 0 24 18" fill="none"
                 stroke="currentColor" stroke-width="1.5">
              <line x1="6" y1="3" x2="18" y2="3"/>
              <line x1="6" y1="7" x2="18" y2="7"/>
              <line x1="6" y1="11" x2="18" y2="11"/>
              <line x1="6" y1="15" x2="18" y2="15"/>
            </svg>
          </button>
          <button type="button" class="width-btn active" data-width="medium"
                  aria-label="Medium width">
            <svg width="24" height="18" viewBox="0 0 24 18" fill="none"
                 stroke="currentColor" stroke-width="1.5">
              <line x1="3" y1="3" x2="21" y2="3"/>
              <line x1="3" y1="7" x2="21" y2="7"/>
              <line x1="3" y1="11" x2="21" y2="11"/>
              <line x1="3" y1="15" x2="21" y2="15"/>
            </svg>
          </button>
          <button type="button" class="width-btn" data-width="wide"
                  aria-label="Wide width">
            <svg width="24" height="18" viewBox="0 0 24 18" fill="none"
                 stroke="currentColor" stroke-width="1.5">
              <line x1="1" y1="3" x2="23" y2="3"/>
              <line x1="1" y1="7" x2="23" y2="7"/>
              <line x1="1" y1="11" x2="23" y2="11"/>
              <line x1="1" y1="15" x2="23" y2="15"/>
            </svg>
          </button>
        </div>
        <div class="width-label-display" id="width-label">Medium</div>
      </div>

      <!-- F. Reset -->
      <div class="control-group reset-group">
        <button type="button" id="reset-btn" class="reset-btn">Reset to defaults</button>
      </div>

    </div>
  </aside>

</div>

<script src="/static/app.js"></script>
{% if prefilled_url %}
<script>window.__prefilled_url = {{ prefilled_url | tojson }};</script>
{% endif %}
</body>
</html>
